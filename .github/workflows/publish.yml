name: Publish

on:
  push:
    branches: [master]
    paths:
      - "Cargo.toml"
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Gate: only proceed if the version in Cargo.toml actually changed
  # ---------------------------------------------------------------------------
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check if Cargo.toml version changed
        id: check
        run: |
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          previous=$(git show HEAD~1:Cargo.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/' || echo "")
          echo "version=$current" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$previous" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $previous -> $current"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $current"
          fi

  # ---------------------------------------------------------------------------
  # Test: Rust unit tests, clippy, and Python tests
  # ---------------------------------------------------------------------------
  test:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.changed == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rust format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test

      - name: Build Python extension
        run: |
          pip install maturin pytest
          maturin develop --features extension-module

      - name: Python tests
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Build: cross-platform wheels
  # ---------------------------------------------------------------------------
  build-wheels:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  # ---------------------------------------------------------------------------
  # Build: source distribution
  # ---------------------------------------------------------------------------
  build-sdist:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # ---------------------------------------------------------------------------
  # Publish to PyPI (only on push to master, not PRs)
  # ---------------------------------------------------------------------------
  publish:
    needs: [build-wheels, build-sdist, detect-version-change]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
          path: dist
      - name: List artefacts
        run: ls -lh dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
